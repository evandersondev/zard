<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1024"/>
      <stop offset="100%" stop-color="#141a36"/>
    </linearGradient>
    <linearGradient id="zardBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="zodBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="yupBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- decorative dots/grid (subtle) -->
  <g opacity="0.06" fill="#22d3ee">
    <circle cx="120" cy="180" r="2"/>
    <circle cx="980" cy="120" r="3"/>
    <circle cx="220" cy="1280" r="2"/>
    <circle cx="900" cy="1200" r="2"/>
    <circle cx="500" cy="80" r="2"/>
    <circle cx="50" cy="700" r="2"/>
    <circle cx="1020" cy="640" r="3"/>
  </g>

  <!-- Header -->
  <g transform="translate(60, 70)">
    <text x="0" y="0" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-2">zard</text>
    <text x="0" y="40" font-size="20" font-weight="400" fill="#94a3b8">A Zod-inspired validation library for Dart</text>
  </g>

  <!-- Version badge -->
  <g transform="translate(880, 60)">
    <rect x="0" y="0" width="140" height="34" rx="17" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1"/>
    <text x="70" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#10b981">⚡ PERF UPDATE</text>
  </g>

  <!-- Hero text -->
  <g transform="translate(60, 200)">
    <text x="0" y="0" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-2">
      <tspan x="0" dy="0">Now </tspan><tspan fill="url(#zardBar)" filter="url(#glow)">faster than Zod</tspan>
    </text>
    <text x="0" y="80" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-2">on 8 of 11 scenarios.</text>

    <text x="0" y="140" font-size="22" font-weight="400" fill="#cbd5e1" opacity="0.85">
      Refactor: precompiled regex • no-throw internal path • lazy issue
    </text>
    <text x="0" y="170" font-size="22" font-weight="400" fill="#cbd5e1" opacity="0.85">
      lists • single-lookup map access — zero breaking changes.
    </text>
  </g>

  <!-- Big stats row -->
  <g transform="translate(60, 410)">
    <g>
      <text x="0" y="0" font-size="42" font-weight="800" fill="#22d3ee">20M</text>
      <text x="0" y="26" font-size="14" font-weight="500" fill="#94a3b8">ops/sec · primitives</text>
    </g>
    <g transform="translate(260, 0)">
      <text x="0" y="0" font-size="42" font-weight="800" fill="#22d3ee">2.7M</text>
      <text x="0" y="26" font-size="14" font-weight="500" fill="#94a3b8">ops/sec · small objects</text>
    </g>
    <g transform="translate(520, 0)">
      <text x="0" y="0" font-size="42" font-weight="800" fill="#22d3ee">340k</text>
      <text x="0" y="26" font-size="14" font-weight="500" fill="#94a3b8">ops/sec · complex nested</text>
    </g>
    <g transform="translate(780, 0)">
      <text x="0" y="0" font-size="42" font-weight="800" fill="#10b981">36×</text>
      <text x="0" y="26" font-size="14" font-weight="500" fill="#94a3b8">faster than Zod on errors</text>
    </g>
  </g>

  <!-- Divider -->
  <line x1="60" y1="490" x2="1020" y2="490" stroke="#1e293b" stroke-width="1"/>

  <!-- Chart title -->
  <g transform="translate(60, 530)">
    <text x="0" y="0" font-size="26" font-weight="700" fill="#ffffff">Time per operation (µs · lower is better)</text>
    <text x="0" y="28" font-size="14" font-weight="400" fill="#64748b">100k iterations · 5k warmup · Dart 3.11 JIT vs Node 24 V8</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 600)" font-size="14" font-weight="600">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="url(#zardBar)"/>
    <text x="22" y="12" fill="#e2e8f0">Zard (Dart)</text>
    <rect x="160" y="0" width="14" height="14" rx="3" fill="url(#zodBar)"/>
    <text x="182" y="12" fill="#e2e8f0">Zod (JS)</text>
    <rect x="290" y="0" width="14" height="14" rx="3" fill="url(#yupBar)"/>
    <text x="312" y="12" fill="#e2e8f0">Yup (JS)</text>
  </g>

  <!-- Chart bars (horizontal) -->
  <!-- Scale: 380px = 1.30 µs. Yup bars get clipped + show value if exceeded. -->
  <!-- Helper: max chart width = 380; values normalized below.   -->
  <g transform="translate(60, 650)" font-size="14">
    <!-- Each row: label + 3 bars + values -->
    <!-- Row height = 64; group height = 22 each -->

    <!-- ROW 1: String valid (Zard 0.05, Zod 0.11, Yup 1.27) max 1.30 -->
    <g transform="translate(0, 0)">
      <text x="0" y="14" font-size="15" font-weight="600" fill="#e2e8f0">String valid</text>
      <text x="0" y="32" font-size="12" fill="#64748b">z.string().min(3)</text>

      <g transform="translate(220, 0)">
        <rect x="0" y="0" width="15" height="14" rx="2" fill="url(#zardBar)"/>
        <text x="20" y="11" font-weight="700" fill="#22d3ee">0.05 µs</text>
        <text x="80" y="11" fill="#10b981" font-weight="600">2.2× faster</text>

        <rect x="0" y="20" width="32" height="14" rx="2" fill="url(#zodBar)"/>
        <text x="40" y="31" fill="#fbbf24">0.11 µs</text>

        <rect x="0" y="40" width="372" height="14" rx="2" fill="url(#yupBar)"/>
        <text x="380" y="51" fill="#94a3b8">1.27 µs</text>
      </g>
    </g>

    <!-- ROW 2: Small object (Zard 0.36, Zod 0.37, Yup 3.82) max ~4.0; bar width scaled max ≈380 to cap Yup at clipping marker -->
    <g transform="translate(0, 130)">
      <text x="0" y="14" font-size="15" font-weight="600" fill="#e2e8f0">Small object</text>
      <text x="0" y="32" font-size="12" fill="#64748b">2 keys: name + age</text>

      <g transform="translate(220, 0)">
        <rect x="0" y="0" width="105" height="14" rx="2" fill="url(#zardBar)"/>
        <text x="113" y="11" font-weight="700" fill="#22d3ee">0.36 µs</text>
        <text x="180" y="11" fill="#10b981" font-weight="600">≈ tied with Zod</text>

        <rect x="0" y="20" width="108" height="14" rx="2" fill="url(#zodBar)"/>
        <text x="116" y="31" fill="#fbbf24">0.37 µs</text>

        <!-- Yup 3.82 µs would exceed 380px @ 100 px/µs; clip to 360 + show jagged end + value -->
        <rect x="0" y="40" width="360" height="14" rx="2" fill="url(#yupBar)"/>
        <path d="M 360 40 L 372 40 L 366 47 L 372 54 L 360 54 Z" fill="url(#yupBar)"/>
        <text x="380" y="51" fill="#94a3b8">3.82 µs</text>
      </g>
    </g>

    <!-- ROW 3: Transform (Zard 0.06, Zod 0.24, Yup 0.81) max 1.30; scaled at 290 px/µs -->
    <g transform="translate(0, 260)">
      <text x="0" y="14" font-size="15" font-weight="600" fill="#e2e8f0">Transform</text>
      <text x="0" y="32" font-size="12" fill="#64748b">z.string().transform(...)</text>

      <g transform="translate(220, 0)">
        <rect x="0" y="0" width="18" height="14" rx="2" fill="url(#zardBar)"/>
        <text x="26" y="11" font-weight="700" fill="#22d3ee">0.06 µs</text>
        <text x="86" y="11" fill="#10b981" font-weight="600">3.7× faster</text>

        <rect x="0" y="20" width="70" height="14" rx="2" fill="url(#zodBar)"/>
        <text x="78" y="31" fill="#fbbf24">0.24 µs</text>

        <rect x="0" y="40" width="237" height="14" rx="2" fill="url(#yupBar)"/>
        <text x="245" y="51" fill="#94a3b8">0.81 µs</text>
      </g>
    </g>

    <!-- ROW 4: Union (int) (Zard 0.08, Zod 0.16, Yup 1.19) -->
    <g transform="translate(0, 390)">
      <text x="0" y="14" font-size="15" font-weight="600" fill="#e2e8f0">Union (int)</text>
      <text x="0" y="32" font-size="12" fill="#64748b">z.union([string, int]).parse(10)</text>

      <g transform="translate(220, 0)">
        <rect x="0" y="0" width="23" height="14" rx="2" fill="url(#zardBar)"/>
        <text x="31" y="11" font-weight="700" fill="#22d3ee">0.08 µs</text>
        <text x="91" y="11" fill="#10b981" font-weight="600">2× faster · 10× vs old Zard</text>

        <rect x="0" y="20" width="46" height="14" rx="2" fill="url(#zodBar)"/>
        <text x="54" y="31" fill="#fbbf24">0.16 µs</text>

        <rect x="0" y="40" width="345" height="14" rx="2" fill="url(#yupBar)"/>
        <text x="353" y="51" fill="#94a3b8">1.19 µs</text>
      </g>
    </g>

    <!-- ROW 5: String invalid (Zard 0.55, Zod 19.67, Yup 29.28) — massive Zard win, capped bars -->
    <g transform="translate(0, 520)">
      <text x="0" y="14" font-size="15" font-weight="600" fill="#e2e8f0">String invalid (throw)</text>
      <text x="0" y="32" font-size="12" fill="#64748b">error path · exception cost</text>

      <g transform="translate(220, 0)">
        <rect x="0" y="0" width="160" height="14" rx="2" fill="url(#zardBar)"/>
        <text x="168" y="11" font-weight="700" fill="#22d3ee">0.55 µs</text>
        <text x="232" y="11" fill="#10b981" font-weight="600">36× faster</text>

        <rect x="0" y="20" width="360" height="14" rx="2" fill="url(#zodBar)"/>
        <path d="M 360 20 L 372 20 L 366 27 L 372 34 L 360 34 Z" fill="url(#zodBar)"/>
        <text x="380" y="31" fill="#fbbf24">19.67 µs</text>

        <rect x="0" y="40" width="360" height="14" rx="2" fill="url(#yupBar)"/>
        <path d="M 360 40 L 372 40 L 366 47 L 372 54 L 360 54 Z" fill="url(#yupBar)"/>
        <text x="380" y="51" fill="#94a3b8">29.28 µs</text>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(60, 1270)">
    <line x1="0" y1="-20" x2="960" y2="-20" stroke="#1e293b" stroke-width="1"/>
    <text x="0" y="14" font-size="16" font-weight="600" fill="#94a3b8">pub.dev/packages/zard</text>
    <text x="0" y="40" font-size="13" fill="#64748b">github.com/evandersondev/zard · MIT · zero breaking changes</text>

    <text x="960" y="14" text-anchor="end" font-size="14" font-weight="600" fill="#22d3ee">Built with ❤ in Dart</text>
    <text x="960" y="40" text-anchor="end" font-size="13" fill="#64748b">219 / 221 tests passing</text>
  </g>
</svg>
